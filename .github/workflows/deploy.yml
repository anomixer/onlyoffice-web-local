name: 部署 Vite 專案到 GitHub Pages 併發布 Release 附件

on:
  push:
    branches:
      - main  # 當 main 分支有 push 時觸發

jobs:
  deploy:
    runs-on: ubuntu-latest  # 使用最新版本的 Ubuntu 作為執行環境
    steps:
      # 第一步：檢出倉庫程式碼
      - name: 拉取程式碼
        uses: actions/checkout@v3

      # 第二步：設定 Node.js 環境
      - name: 設定 Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20  # 指定 Node.js 版本

      # 第三步：安裝 pnpm（版本 10）
      - name: 設定 pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10
          run_install: false  # 不自動安裝依賴，下一步手動執行

      # 第四步：安裝依賴
      - name: 安裝依賴
        run: pnpm install --no-frozen-lockfile

      # 第五步：構建專案
      - name: 構建專案
        run: pnpm run build

      # 第六步：將構建產物打包成 html.zip
      - name: 壓縮構建目錄為 html.zip
        run: zip -r html.zip html

      # # 第七步：將原始碼打包成 source.zip（排除 .git、node_modules 和 html）
      # - name: 壓縮原始碼為 source.zip
      #   run: zip -r source.zip . -x '*.git*' 'node_modules/*' 'html/*'

      # # 第八步：將原始碼打包成 source.tar（同樣排除不必要內容）
      # - name: 壓縮原始碼為 source.tar
      #   run: tar --exclude='./node_modules' --exclude='./.git' --exclude='./html' -cvf source.tar .

      # 第九步：部署到 GitHub Pages
      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./html  # 指定構建輸出目錄

      # 第十步：建立 GitHub Release 並上傳壓縮包
      - name: 釋出 Release 並上傳構建包
        uses: softprops/action-gh-release@v1
        with:
          tag_name: release-${{ github.run_number }}  # 每次構建使用唯一的 tag
          name: Release ${{ github.run_number }}      # Release 名稱
          files: |
            html.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # 使用 GitHub 自動生成的 token 授權
